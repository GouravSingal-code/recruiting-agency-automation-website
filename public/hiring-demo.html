<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortlisted.ai — Hiring Pipeline Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  font-family: 'Inter', sans-serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#stage-wrapper {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#stage {
  width: 1280px; height: 720px;
  position: relative;
  background: #07070f;
  overflow: hidden;
  transform-origin: center center;
}
.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}
.scene {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.6s ease;
  pointer-events: none;
}
.scene.active { opacity: 1; pointer-events: all; }

#progress-bar {
  display: none;
}
#subtitle {
  display: none;
}
#scene-counter {
  display: none;
}
#autostart-overlay {
  display: none;
  position: absolute; inset: 0;
  background: rgba(7,7,15,0.92);
  z-index: 9999;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  cursor: pointer;
}
#autostart-overlay .play-circle {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: #3B82F6;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 0 rgba(59,130,246,0.5);
  animation: pulse-ring 1.6s ease-out infinite;
}
#autostart-overlay .play-circle svg { margin-left: 6px; }
#autostart-overlay p {
  color: #fff; font-family: 'Inter', sans-serif;
  font-size: 18px; font-weight: 600; margin: 0;
}
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.55); }
  70%  { box-shadow: 0 0 0 22px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}
#controls {
  display: none;
}
#controls button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 5px 13px;
  border-radius: 6px; cursor: pointer;
  font-size: 11px; font-family: 'Inter', sans-serif;
  transition: background 0.2s;
}
#controls button:hover { background: rgba(255,255,255,0.18); }

/* Keyframes */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideR  { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideL  { from{opacity:0;transform:translateX(-28px)} to{opacity:1;transform:translateX(0)} }
@keyframes scaleIn { from{opacity:0;transform:scaleX(0)} to{opacity:1;transform:scaleX(1)} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes ringPulse { 0%,100%{transform:scale(1);opacity:0.25} 50%{transform:scale(1.12);opacity:0.55} }
@keyframes logoIn  { from{opacity:0;transform:scale(0.88);filter:blur(12px)} to{opacity:1;transform:scale(1);filter:blur(0)} }
@keyframes wave    { 0%,100%{height:6px} 50%{height:var(--wh,20px)} }
@keyframes glowPulse { 0%,100%{box-shadow:0 0 8px rgba(16,185,129,0.4)} 50%{box-shadow:0 0 22px rgba(16,185,129,0.9)} }
@keyframes typingCursor { 0%,100%{opacity:1} 50%{opacity:0} }

.scene-step  { display: none; }
.scene-title { display: none; }

/* Scene 0 */
.glow-ring {
  position: absolute; width: 420px; height: 420px;
  border-radius: 50%; border: 1px solid rgba(79,142,247,0.25);
  animation: ringPulse 2.5s ease-in-out infinite;
}
.glow-ring-2 {
  position: absolute; width: 280px; height: 280px;
  border-radius: 50%; border: 1px solid rgba(124,58,237,0.2);
  animation: ringPulse 2.5s ease-in-out infinite 0.8s;
}
.logo-text {
  font-size: 76px; font-weight: 800; color: #fff;
  letter-spacing: -3px;
  text-shadow: 0 0 60px rgba(79,142,247,0.9), 0 0 120px rgba(79,142,247,0.4);
  animation: logoIn 1.4s ease forwards 0.4s; opacity: 0; position: relative;
}
.logo-tagline {
  font-size: 17px; color: rgba(255,255,255,0.4);
  margin-top: 14px; font-weight: 300; letter-spacing: 1px;
  animation: fadeIn 1s ease forwards 1.6s; opacity: 0; position: relative;
}

/* Scene 3 — profile cards */
.profiles-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; width: 840px; }
.profile-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 13px 15px;
  opacity: 0; animation: slideR 0.4s ease forwards;
  display: flex; align-items: center; gap: 11px;
}
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.pname  { color: #fff; font-size: 13px; font-weight: 600; }
.ptitle { color: rgba(255,255,255,0.38); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.mscore { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: rgba(16,185,129,0.15); color: #34d399; flex-shrink: 0; margin-left: auto; }

/* Resume bars */
.resume-row { display: flex; gap: 16px; width: 900px; align-items: flex-end; }
.resume-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.resume-bar-bg {
  width: 36px; height: 200px;
  background: rgba(255,255,255,0.04); border-radius: 6px;
  position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
}
.resume-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 4px; height: 0; transition: height 0.8s ease; }
.resume-bar-label { font-size: 10px; color: rgba(255,255,255,0.3); }
.resume-bar-score { font-size: 11px; font-weight: 700; }
.threshold-line { position: absolute; left: 0; right: 0; height: 1px; background: rgba(239,68,68,0.5); }

/* Call scene */
.call-wrap { width: 680px; }
.call-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.call-live { display: flex; align-items: center; gap: 8px; color: #10b981; font-size: 13px; font-weight: 500; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 1s ease infinite; }
.call-timer { color: rgba(255,255,255,0.3); font-size: 12px; }
.waveform { display: flex; align-items: center; gap: 3px; height: 44px; margin-bottom: 18px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 0 12px; }
.wbar { width: 3px; border-radius: 2px; background: linear-gradient(to top, #4f8ef7, #7c3aed); animation: wave 0.7s ease-in-out infinite; }
.tline { display: flex; gap: 12px; margin-bottom: 11px; opacity: 0; animation: fadeUp 0.4s ease forwards; }
.tspeaker { font-size: 11px; font-weight: 700; color: #4f8ef7; white-space: nowrap; min-width: 42px; }
.ttext { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.55; }
.score-chip {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 14px; padding: 5px 12px; border-radius: 20px;
  background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3);
  color: #34d399; font-size: 12px; font-weight: 600;
  opacity: 0; animation: fadeIn 0.5s ease forwards;
}

/* Shortlist */
.shortlist-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; width: 780px; }
.sl-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(79,142,247,0.18);
  border-radius: 12px; padding: 20px;
  opacity: 0; animation: fadeUp 0.5s ease forwards;
}
.sl-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.sl-role { font-size: 12px; color: rgba(255,255,255,0.38); margin-bottom: 14px; }
.sl-metrics { display: flex; gap: 10px; }
.sl-metric { flex: 1; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 9px 6px; text-align: center; }
.sl-val { font-size: 20px; font-weight: 700; color: #4f8ef7; }
.sl-lbl { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }

/* CTA */
.cta-title {
  font-size: 46px; font-weight: 800; text-align: center; line-height: 1.18;
  background: linear-gradient(135deg, #fff 0%, #a78bfa 60%, #4f8ef7 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: fadeUp 0.7s ease forwards 0.2s; opacity: 0; position: relative;
}
.cta-sub {
  font-size: 17px; color: rgba(255,255,255,0.38); margin-top: 14px; font-weight: 300;
  animation: fadeUp 0.7s ease forwards 0.5s; opacity: 0; position: relative;
}
.cta-btn {
  margin-top: 34px; padding: 14px 38px;
  background: linear-gradient(135deg, #4f8ef7, #7c3aed);
  border: none; border-radius: 8px; color: #fff;
  font-size: 16px; font-weight: 600; cursor: pointer; position: relative;
  animation: fadeUp 0.7s ease forwards 0.8s; opacity: 0;
  box-shadow: 0 0 40px rgba(79,142,247,0.35);
}

/* Mock cursor */
.mock-cursor {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(20,20,30,0.85); border: 2px solid rgba(255,255,255,0.88);
  position: absolute; pointer-events: none; z-index: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: left 0.55s cubic-bezier(0.25,0.46,0.45,0.94),
              top  0.55s cubic-bezier(0.25,0.46,0.45,0.94),
              transform 0.1s ease;
}
.mock-cursor.click { transform: scale(0.58); }

/* Canvas */
#hfunnel-canvas-4, #hfunnel-canvas-10 { display: block; border-radius: 10px; }

/* Tag chips */
.tag {
  padding: 4px 11px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  opacity: 0; animation: fadeIn 0.3s ease forwards;
}
.tag.blue   { background: rgba(79,142,247,0.15); color: #6fa8ff; border: 1px solid rgba(79,142,247,0.35); }
.tag.purple { background: rgba(124,58,237,0.15); color: #b48aff; border: 1px solid rgba(124,58,237,0.35); }
.tag.cyan   { background: rgba(6,182,212,0.15);  color: #3dd5f0; border: 1px solid rgba(6,182,212,0.35); }
.tag.green  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.35); }
</style>
</head>
<body>
<div id="stage-wrapper">
<div id="stage">
  <div class="grid-bg"></div>
  <div id="progress-bar"></div>
  <div id="subtitle"></div>
  <div id="scene-counter"></div>

  <div id="autostart-overlay" onclick="initAudio(); this.style.display='none';">
    <div class="play-circle">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <polygon points="12,8 28,18 12,28" fill="white"/>
      </svg>
    </div>
    <p>Click to start with audio</p>
  </div>

  <div id="controls">
    <button onclick="prevScene()">Prev</button>
    <button onclick="togglePlay()" id="play-btn">Pause</button>
    <button onclick="nextScene()">Next</button>
    <button onclick="restartDemo()">Restart</button>
    <button onclick="toggleMute()" id="mute-btn">Mute</button>
  </div>

  <!-- Scene 0: Intro -->
  <div class="scene active" id="scene-0" style="flex-direction:column;align-items:center;justify-content:center;gap:0;">
    <div class="glow-ring"></div>
    <div class="glow-ring-2"></div>
    <div class="logo-text" style="animation:logoIn 0.8s ease both;">Shortlisted.ai</div>
    <div class="logo-tagline" style="animation:fadeUp 0.6s ease 0.7s both;">Tell us who you need. We deliver.</div>

  </div>

  <!-- Scene 1: JD Upload -->
  <div class="scene" id="scene-1" style="padding:0;">
    <div id="s1-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;"></div>
  </div>

  <!-- Scene 2: LinkedIn URL Builder -->
  <div class="scene" id="scene-2" style="padding:0;">
    <div id="s2-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:#F3F2EF;"></div>
  </div>

  <!-- Scene 3: Candidate Discovery -->
  <div class="scene" id="scene-3" style="padding:0;">
    <div id="s3-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:#F3F2EF;"></div>
  </div>

  <!-- Scene 4: Horizontal Funnel 1 -->
  <div class="scene" id="scene-4">
    <div class="scene-step" style="animation-delay:0s">Step 4 — Smart Filter Pipeline</div>
    <canvas id="hfunnel-canvas-4"></canvas>
  </div>

  <!-- Scene 5: LinkedIn Messaging -->
  <div class="scene" id="scene-5" style="padding:0;">
    <div id="s5-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:#F3F2EF;"></div>
  </div>

  <!-- Scene 7: Resume Scoring + Filter (combined) -->
  <div class="scene" id="scene-7" style="padding:0;">
    <div id="s7-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:#07070f;"></div>
  </div>

  <!-- Scene 8: Calendar Scheduling -->
  <div class="scene" id="scene-8" style="padding:0;">
    <div id="s8-stage" style="width:1280px;height:720px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:#F3F2EF;"></div>
  </div>

  <!-- Scene 9: AI Intro Call -->
  <div class="scene" id="scene-9">
    <div class="scene-step">Step 9</div>
    <div class="scene-title">AI-Led Intro Call</div>
    <div class="call-wrap">
      <div class="call-header">
        <div class="call-live"><span class="rec-dot"></span> Live Call — Round 1: Introduction</div>
        <div class="call-timer" id="call-timer-9">0:00</div>
      </div>
      <div class="waveform" id="waveform-9"></div>
      <div id="transcript-9"></div>
    </div>
  </div>

  <!-- Scene 11: Final Shortlist -->
  <div class="scene" id="scene-11" style="flex-direction:column;align-items:center;justify-content:center;gap:0;">
    <div id="s11-card-wrap" style="opacity:0;transform:translateY(16px);transition:opacity 0.5s ease,transform 0.5s ease;"></div>
    <div id="s11-msg" style="opacity:0;transform:translateY(10px);transition:opacity 0.55s ease,transform 0.55s ease;margin-top:28px;text-align:center;"></div>
  </div>

  <!-- Scene 12: CTA -->
  <div class="scene" id="scene-12">
    <div class="glow-ring"></div>
    <div class="glow-ring-2"></div>
    <div class="cta-title">From JD to Shortlist.<br>Fully Automated.</div>
    <div class="cta-sub">End-to-end hiring in hours, not weeks.</div>
    <button class="cta-btn">Book Your Demo</button>
  </div>
</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ════════════════════════════════════════════════════════════════════
const SFX = {
  ctx: null, master: null, comp: null, bgGain: null, bgOscs: [],
  muted: false, lastRejectMs: 0,

  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Compressor so bass doesn't clip
    this.comp = this.ctx.createDynamicsCompressor();
    this.comp.threshold.value = -14; this.comp.ratio.value = 4;
    this.comp.connect(this.ctx.destination);
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.42;
    this.master.connect(this.comp);
  },

  note(freq, dur, type = 'sine', vol = 0.22, delay = 0) {
    if (!this.ctx || this.muted) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    const t = this.ctx.currentTime;
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(vol, t + delay + 0.022);
    g.gain.exponentialRampToValueAtTime(0.0001, t + delay + dur);
    o.connect(g); g.connect(this.master);
    o.start(t + delay); o.stop(t + delay + dur + 0.1);
  },

  // Deep sub-bass thump
  _bass(freq = 65, dur = 0.55) {
    if (!this.ctx || this.muted) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    const t = this.ctx.currentTime;
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.05);
  },

  // Rising noise whoosh — the "sexy" transition sweep
  _whoosh(vol = 0.09, dur = 0.45) {
    if (!this.ctx || this.muted) return;
    try {
      const sr  = this.ctx.sampleRate;
      const buf = this.ctx.createBuffer(1, Math.ceil(sr * dur), sr);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const bpf = this.ctx.createBiquadFilter();
      bpf.type = 'bandpass'; bpf.Q.value = 0.7;
      bpf.frequency.setValueAtTime(600, this.ctx.currentTime);
      bpf.frequency.exponentialRampToValueAtTime(5500, this.ctx.currentTime + dur * 0.7);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      src.connect(bpf); bpf.connect(g); g.connect(this.master);
      src.start(); src.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  },

  stopBg() {
    if (this.bgGain && this.ctx) {
      this.bgGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.6);
    }
    this.bgOscs.forEach(o => { try { o.stop(this.ctx.currentTime + 0.7); } catch(e){} });
    this.bgOscs = [];
  },

  _pad(freqs, dur, vol = 0.055) {
    if (!this.ctx || this.muted) return;
    this.bgGain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    this.bgGain.gain.setValueAtTime(0, t);
    this.bgGain.gain.linearRampToValueAtTime(vol, t + 1.2);
    this.bgGain.gain.setValueAtTime(vol, t + dur - 1.2);
    this.bgGain.gain.linearRampToValueAtTime(0, t + dur);
    this.bgGain.connect(this.master);
    freqs.forEach((f, idx) => {
      const o    = this.ctx.createOscillator();
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 700;
      o.type = 'triangle'; o.frequency.value = f;
      o.detune.value = (Math.random() - 0.5) * 8;
      o.connect(filt); filt.connect(this.bgGain);
      o.start(t); o.stop(t + dur + 0.2);
      this.bgOscs.push(o);
    });
  },

  // Scene transition: subtle soft ping only
  playScene(id) {
    if (!this.ctx) return;
    this.stopBg();
  },

  reject() {
    const now = Date.now();
    if (now - this.lastRejectMs < 85) return;
    this.lastRejectMs = now;
    if (!this.ctx || this.muted) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(210, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(85, this.ctx.currentTime + 0.22);
    g.gain.setValueAtTime(0.13, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.22);
    o.connect(g); g.connect(this.master);
    o.start(); o.stop(this.ctx.currentTime + 0.28);
  },

  accept() {
    if (!this.ctx || this.muted) return;
    this.note(783.99, 0.15, 'sine', 0.12);
    this.note(987.77, 0.2,  'sine', 0.09, 0.08);
    this.note(1174.7, 0.18, 'sine', 0.06, 0.16);
  },

  ping() {
    this.note(1046.5, 0.14, 'sine', 0.22);
    this.note(1318.5, 0.22, 'sine', 0.16, 0.1);
  },

  // Soft rising arpeggio
  triumph() {
    if (!this.ctx || this.muted) return;
    [392.00, 523.25, 659.25, 783.99].forEach((f, i) =>
      this.note(f, 0.28, 'sine', 0.07 - i * 0.01, i * 0.09));
  },

  profilePing(delay = 0) {
    if (!this.ctx || this.muted) return;
    const base = [783.99, 880, 987.77, 1046.5, 1108.7][Math.floor(Math.random() * 5)];
    this.note(base,        0.14, 'sine', 0.10, delay);
    this.note(base * 1.25, 0.10, 'sine', 0.05, delay + 0.06);
  },

  sendSound() {
    if (!this.ctx || this.muted) return;
    this.note(523.25, 0.18, 'sine', 0.09);
    this.note(659.25, 0.22, 'sine', 0.07, 0.1);
    this.note(783.99, 0.18, 'sine', 0.05, 0.2);
  },

  typingClick() {
    if (!this.ctx || this.muted) return;
    this.note(2200 + Math.random() * 600, 0.025, 'sine', 0.03);
  },
};

// ════════════════════════════════════════════════════════════════════
// HORIZONTAL FUNNEL — reusable hFunnel(canvas, cfg)
// ════════════════════════════════════════════════════════════════════
function hFunnel(canvas, cfg) {
  const W = canvas.width  = cfg.width  || 1100;
  const H = canvas.height = cfg.height || 380;
  const c = canvas.getContext('2d');
  const cy = H / 2;

  const pts   = cfg.pts;
  const gates = cfg.gates;

  function fhh(x) {
    for (let i = 0; i < pts.length - 1; i++) {
      if (x >= pts[i][0] && x <= pts[i+1][0]) {
        const t = (x - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
        return pts[i][1] + (pts[i+1][1] - pts[i][1]) * t;
      }
    }
    if (x < pts[0][0]) return pts[0][1];
    return pts[pts.length-1][1];
  }

  const COLORS   = ['#4f8ef7','#7c3aed','#06b6d4','#10b981','#f59e0b','#ec4899','#8b5cf6','#14b8a6'];
  const GRID_N   = 25;  // faces shown in left panel grid

  const totalCount = cfg.leftPanel ? (cfg.leftPanel.count || 20) : 20;
  const maxSpawn   = cfg.maxSpawn || 32;

  // Track how many faces are still "waiting" in left panel
  // (proportional: waiting / totalCount maps to grid slots)
  let waiting     = totalCount;
  let exitedCount = 0;

  const particles = [];
  let spawned = 0, frame = 0, rafId;

  function spawn() {
    const i = spawned++;
    waiting = Math.max(0, waiting - Math.ceil(totalCount / maxSpawn));
    const sx = cfg.funnelStartX !== undefined ? cfg.funnelStartX : pts[0][0];
    const hh = fhh(sx);
    particles.push({
      x:     sx + 2,
      y:     cy + (Math.random() - 0.5) * hh * 1.5,
      vx:    1.0 + Math.random() * 1.0,
      vy:    (Math.random() - 0.5) * 0.7,
      r:     12,
      color: COLORS[i % COLORS.length],
      state: 'flowing',   // flowing → rejected | exited
      alpha: 1,
      gateIdx: 0,
    });
  }

  function update() {
    frame++;
    if (spawned < maxSpawn && frame % 8 === 0) spawn();

    particles.forEach(p => {
      if (p.state === 'flowing') {
        p.vx = Math.min(p.vx + 0.012, 4.0);
        p.vy *= 0.97;
        p.x  += p.vx;
        p.y  += p.vy;

        // Funnel wall constraint
        const hh  = fhh(p.x);
        const top = cy - hh + p.r, bot = cy + hh - p.r;
        if (p.y < top) { p.y = top; p.vy =  Math.abs(p.vy) * 0.5 + 0.2; }
        if (p.y > bot) { p.y = bot; p.vy = -(Math.abs(p.vy) * 0.5 + 0.2); }

        // Gate check
        if (p.gateIdx < gates.length) {
          const g = gates[p.gateIdx];
          if (p.x >= g.x) {
            p.gateIdx++;
            if (Math.random() > g.passProb) {
              p.state = 'rejected';
              if (audioInited) SFX.reject();
            }
          }
        }

        // Reached exit
        const endX = cfg.funnelEndX !== undefined ? cfg.funnelEndX + 10 : W + 10;
        if (p.x > endX) {
          p.state = 'done';
          exitedCount++;
          if (audioInited) SFX.profilePing();
        }

      } else if (p.state === 'rejected') {
        // Fade out cleanly in-place with a slight downward drift
        p.y     += 1.2;
        p.alpha -= 0.022;
        if (p.alpha <= 0) { p.alpha = 0; p.state = 'dead'; }
      }
      // 'done' and 'dead' — no further movement
    });
  }

  function drawFace(fx, fy, fr, fcolor, mode) {
    const fc = mode === 'rejected' ? '#ef4444'
             : mode === 'exited'   ? '#10b981'
             :                       fcolor;
    const fill = mode === 'rejected' ? 'rgba(239,68,68,0.15)'
               : mode === 'exited'   ? 'rgba(16,185,129,0.18)'
               :                       fcolor + '22';
    c.beginPath(); c.arc(fx, fy, fr, 0, Math.PI * 2);
    c.fillStyle   = fill;
    c.strokeStyle = fc;
    c.lineWidth   = mode === 'exited' ? 2 : 1.5;
    c.fill(); c.stroke();
    // Eyes
    c.fillStyle = fc;
    c.beginPath(); c.arc(fx - fr*0.27, fy - fr*0.14, fr*0.15, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(fx + fr*0.27, fy - fr*0.14, fr*0.15, 0, Math.PI*2); c.fill();
    // Mouth
    c.beginPath();
    if (mode === 'rejected') {
      c.moveTo(fx - fr*0.22, fy + fr*0.08); c.lineTo(fx + fr*0.22, fy + fr*0.28);
      c.moveTo(fx + fr*0.22, fy + fr*0.08); c.lineTo(fx - fr*0.22, fy + fr*0.28);
      c.strokeStyle = fc; c.lineWidth = 1.2; c.stroke();
    } else {
      c.arc(fx, fy + fr*0.08, fr*0.24, 0.2, Math.PI - 0.2);
      c.strokeStyle = fc; c.lineWidth = 1.3; c.stroke();
    }
  }

  function draw() {
    c.clearRect(0, 0, W, H);

    // ── Left panel: grid of waiting faces (dims as faces enter funnel) ──
    if (cfg.leftPanel) {
      const funnelX  = cfg.funnelStartX || pts[0][0];
      const lcols = 5, lfr = 9, lgap = 22;
      const lrows = Math.ceil(GRID_N / lcols);
      const lgridW = lcols * lgap;
      const lgridH = lrows * lgap;
      const lgx0   = funnelX - lgridW - 12 + lgap / 2;
      const lgy0   = cy - lgridH / 2 + lgap / 2;

      // How many grid slots are "active" (still waiting)
      const activeSlots = Math.round(waiting / totalCount * GRID_N);

      // Panel background box
      c.save();
      c.fillStyle   = 'rgba(79,142,247,0.06)';
      c.strokeStyle = 'rgba(79,142,247,0.18)';
      c.lineWidth   = 1;
      const bx = lgx0 - lfr - 10, by = lgy0 - lfr - 22;
      const bw = lgridW + 12,      bh = lgridH + lfr + 22 + 30;
      c.beginPath(); c.roundRect(bx, by, bw, bh, 6); c.fill(); c.stroke();
      c.restore();

      // Label
      c.fillStyle = 'rgba(79,142,247,0.9)';
      c.font = 'bold 10px Inter,sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.fillText(cfg.leftPanel.label || 'Entering', lgx0 + lgridW/2 - lgap/2, lgy0 - lfr - 8);

      // Faces — active ones bright, gone ones very dim
      for (let fi = 0; fi < GRID_N; fi++) {
        c.save();
        c.globalAlpha = fi < activeSlots ? 0.85 : 0.1;
        drawFace(lgx0 + (fi % lcols) * lgap, lgy0 + Math.floor(fi / lcols) * lgap, lfr, COLORS[fi % COLORS.length], 'normal');
        c.restore();
      }

      // Count
      c.fillStyle = 'rgba(255,255,255,0.65)';
      c.font = 'bold 12px Inter,sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.fillText(waiting + ' users', lgx0 + lgridW/2 - lgap/2, lgy0 + lgridH + 18);
    }

    // ── Funnel fill ──
    c.beginPath();
    c.moveTo(pts[0][0], cy - pts[0][1]);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i][0], cy - pts[i][1]);
    c.lineTo(pts[pts.length-1][0], cy + pts[pts.length-1][1]);
    for (let i = pts.length-1; i >= 0; i--) c.lineTo(pts[i][0], cy + pts[i][1]);
    c.closePath();
    const grad = c.createLinearGradient(pts[0][0], 0, pts[pts.length-1][0], 0);
    grad.addColorStop(0, 'rgba(79,142,247,0.09)');
    grad.addColorStop(1, 'rgba(124,58,237,0.15)');
    c.fillStyle = grad; c.fill();

    // ── Funnel walls ──
    [1, -1].forEach(sign => {
      c.beginPath();
      c.moveTo(pts[0][0], cy + sign * pts[0][1]);
      for (let i = 1; i < pts.length; i++) c.lineTo(pts[i][0], cy + sign * pts[i][1]);
      c.shadowColor = 'rgba(79,142,247,0.5)';
      c.shadowBlur  = 10;
      c.strokeStyle = 'rgba(79,142,247,0.65)';
      c.lineWidth   = 2;
      c.stroke();
      c.shadowBlur  = 0;
    });

    // ── Gate lines ──
    gates.forEach((g, i) => {
      const hh  = fhh(g.x);
      const col = g.color || '#ef4444';
      c.save();
      c.setLineDash([5, 4]);
      c.beginPath();
      c.moveTo(g.x, cy - hh);
      c.lineTo(g.x, cy + hh);
      c.strokeStyle = col; c.lineWidth = 1.8; c.globalAlpha = 0.7;
      c.stroke();
      c.restore();
      c.fillStyle   = col; c.globalAlpha = 0.9;
      c.font        = 'bold 10px Inter,sans-serif';
      c.textAlign   = 'center';
      c.fillText('Filter ' + (i+1), g.x, cy - hh - 8);
      c.globalAlpha = 1;
    });

    // ── Count labels ──
    if (cfg.counts) {
      cfg.counts.forEach((ct, i) => {
        const xPos = i === 0 ? pts[0][0] + 12
                   : (gates[i-1] ? gates[i-1].x + 12 : pts[pts.length-1][0] - 60);
        const hh  = fhh(xPos);
        const col = ['#4f8ef7','#f59e0b','#06b6d4','#10b981'][i] || '#fff';
        c.fillStyle = col + 'cc'; c.font = '10px Inter,sans-serif';
        c.textAlign = 'left';
        c.fillText(ct, xPos, cy - hh - 22);
        c.globalAlpha = 1;
      });
    }

    // ── Particles (flowing + rejecting) ──
    particles.forEach(p => {
      if (p.state === 'dead' || p.state === 'done' || p.alpha <= 0) return;
      c.save();
      c.globalAlpha = p.alpha;
      const isRej = p.state === 'rejected';
      if (!isRej) { c.shadowColor = p.color; c.shadowBlur = 9; }
      drawFace(p.x, p.y, p.r, p.color, isRej ? 'rejected' : 'normal');
      c.shadowBlur = 0;
      c.restore();
    });

    // ── Right panel: faces that passed ──
    if (cfg.rightPanel) {
      const PX    = (cfg.funnelEndX !== undefined ? cfg.funnelEndX : W - 150) + 12;
      const rcols = 3, rfr = 10, rgap = 24;
      const showN = Math.min(exitedCount, 18);
      const rrows = Math.max(Math.ceil(showN / rcols), 1);
      const rgridW = rcols * rgap;
      const rgridH = rrows * rgap;
      const rgx0   = PX + rgap / 2;
      const rgy0   = cy - rgridH / 2 + rgap / 2;

      if (showN > 0) {
        // Panel background box
        c.save();
        c.fillStyle   = 'rgba(16,185,129,0.07)';
        c.strokeStyle = 'rgba(16,185,129,0.25)';
        c.lineWidth   = 1;
        const bx = rgx0 - rfr - 8, by = rgy0 - rfr - 22;
        const bw = rgridW + 12,     bh = rgridH + rfr + 22 + 30;
        c.beginPath(); c.roundRect(bx, by, bw, bh, 6); c.fill(); c.stroke();
        c.restore();

        // Label
        c.fillStyle = 'rgba(16,185,129,0.9)';
        c.font = 'bold 10px Inter,sans-serif';
        c.textAlign = 'center'; c.textBaseline = 'alphabetic';
        c.fillText('✓ Passed', rgx0 + rgridW/2 - rgap/2, rgy0 - rfr - 8);

        // Faces
        for (let fi = 0; fi < showN; fi++) {
          drawFace(rgx0 + (fi % rcols) * rgap, rgy0 + Math.floor(fi / rcols) * rgap, rfr, '#10b981', 'exited');
        }

        // Count
        c.globalAlpha = Math.min(exitedCount / 3, 1);
        c.fillStyle = '#34d399'; c.font = 'bold 12px Inter,sans-serif';
        c.textAlign = 'center'; c.textBaseline = 'alphabetic';
        c.fillText(exitedCount + ' passed', rgx0 + rgridW/2 - rgap/2, rgy0 + rgridH + 18);
        c.globalAlpha = 1;
      }
    }
  }

  function loop() { update(); draw(); rafId = requestAnimationFrame(loop); }
  loop();
  return () => cancelAnimationFrame(rafId);
}

      msgs.appendChild(rep);

  T(() => { if (audioInited) SFX.triumph(); }, BOTH_DONE + 1800);

}

// SETUP 7 — Resume Scoring (box animation)
// ════════════════════════════════════════════════════════════════════
function setup7() {
  const stage = document.getElementById('s7-stage');
  if (!stage) return;

  const timers = [];
  const T = (fn, d) => timers.push(setTimeout(fn, d));

  const resumes = [
    { name:'Arjun Mehta',  init:'AM', score:88, color:'#4f8ef7' },
    { name:'Priya Sharma', init:'PS', score:91, color:'#7c3aed' },
    { name:'Rohan Gupta',  init:'RG', score:83, color:'#06b6d4' },
    { name:'Alex Torres',  init:'AT', score:55, color:'#f59e0b' },
    { name:'Maya Rao',     init:'MR', score:48, color:'#14b8a6' },
  ];
  const THRESH = 65;

  // Layout constants
  const CARD_H = 44, GAP = 7, SLOT = 51;
  const totalH = resumes.length * CARD_H + (resumes.length - 1) * GAP; // 503
  const startY = Math.round((720 - totalH) / 2);  // ~109
  const LEFT_X  = 40,  LIST_W  = 470;
  const BOX_X   = 548, BOX_W   = 184;
  const RIGHT_X = 768, RLIST_W = 472;
  const BOX_TOP = startY - 18, BOX_H = totalH + 36;

  stage.innerHTML = `
    <div style="width:1280px;height:720px;position:relative;background:#07070f;overflow:hidden;font-family:Inter,sans-serif;">

      <!-- Left: resume list -->
      <div id="s7-left" style="position:absolute;left:${LEFT_X}px;top:${startY}px;width:${LIST_W}px;display:flex;flex-direction:column;gap:${GAP}px;"></div>

      <!-- Center: AI black box -->
      <div id="s7-aibox" style="position:absolute;left:${BOX_X}px;top:${BOX_TOP}px;width:${BOX_W}px;height:${BOX_H}px;background:linear-gradient(170deg,#0e0325 0%,#04091a 100%);border:1px solid rgba(79,142,247,0.2);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-shadow:0 0 50px rgba(79,142,247,0.06),inset 0 0 60px rgba(0,0,0,0.5);transition:box-shadow 0.3s,border-color 0.3s;">
        <div style="font-size:38px;line-height:1;color:rgba(255,255,255,0.82);">✦</div>
      </div>

      <!-- Right: score list -->
      <div id="s7-right" style="position:absolute;left:${RIGHT_X}px;top:${startY}px;width:${RLIST_W}px;display:flex;flex-direction:column;gap:${GAP}px;"></div>

      <!-- Flying card (absolutely positioned overlay) -->
      <div id="s7-flyer" style="position:absolute;pointer-events:none;z-index:20;height:${CARD_H}px;border-radius:8px;display:flex;align-items:center;gap:10px;padding:0 12px;opacity:0;overflow:hidden;"></div>

    </div>
  `;

  const leftEl  = document.getElementById('s7-left');
  const rightEl = document.getElementById('s7-right');
  const aibox   = document.getElementById('s7-aibox');
  const flyer   = document.getElementById('s7-flyer');

  // Build left cards + right score slots
  resumes.forEach((r, i) => {
    // Left card
    const card = document.createElement('div');
    card.id = 's7-lcard-' + i;
    card.style.cssText = `height:${CARD_H}px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;display:flex;align-items:center;gap:10px;padding:0 12px;opacity:0;transform:translateX(-14px);transition:opacity 0.25s,transform 0.25s,background 0.35s,border-color 0.35s;`;
    card.innerHTML = `
      <div style="width:26px;height:26px;border-radius:5px;background:${r.color}1a;border:1px solid ${r.color}40;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${r.color};flex-shrink:0;">${r.init}</div>
      <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.75);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</div>
      <div id="s7-lsc-${i}" style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.18);min-width:34px;text-align:right;transition:color 0.3s;">—</div>`;
    leftEl.appendChild(card);

    // Right score slot
    const slot = document.createElement('div');
    slot.id = 's7-rscore-' + i;
    slot.style.cssText = `height:${CARD_H}px;display:flex;align-items:center;gap:10px;padding:0 12px;opacity:0;transform:translateX(10px);transition:opacity 0.28s,transform 0.28s;`;
    slot.innerHTML = `
      <div id="s7-rnum-${i}" style="font-size:18px;font-weight:800;min-width:50px;line-height:1;"></div>
      <div id="s7-rlbl-${i}" style="font-size:8px;font-weight:700;letter-spacing:2px;padding:3px 9px;border-radius:4px;flex-shrink:0;"></div>`;
    rightEl.appendChild(slot);
  });

  // Phase 1: all left cards appear fast (staggered)
  const APPEAR_PER = 110;
  resumes.forEach((r, i) => {
    T(() => {
      const card = document.getElementById('s7-lcard-' + i);
      if (card) { card.style.opacity = '1'; card.style.transform = 'translateX(0)'; }
      if (audioInited) SFX.profilePing();
    }, 160 + i * APPEAR_PER);
  });

  // Phase 2: process each resume one by one through the box
  const ALL_APPEARED = 160 + (resumes.length - 1) * APPEAR_PER + 380;
  const CYCLE = 730;

  resumes.forEach((r, i) => {
    const t0   = ALL_APPEARED + i * CYCLE;
    const pass = r.score >= THRESH;
    const cardY = startY + i * SLOT;

    // Step A: highlight card, launch flyer toward box
    T(() => {
      const card = document.getElementById('s7-lcard-' + i);
      if (card) { card.style.background = r.color + '18'; card.style.borderColor = r.color + '50'; }

      // Set flyer at card's position
      flyer.style.transition  = 'none';
      flyer.style.left        = LEFT_X + 'px';
      flyer.style.top         = cardY + 'px';
      flyer.style.width       = LIST_W + 'px';
      flyer.style.background  = r.color + '18';
      flyer.style.border      = `1px solid ${r.color}50`;
      flyer.style.opacity     = '1';
      flyer.innerHTML = `
        <div style="width:26px;height:26px;border-radius:5px;background:${r.color}20;border:1px solid ${r.color}40;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${r.color};">${r.init}</div>
        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);flex:1;">${r.name}</div>`;

      // Fly into the box (horizontal, same row)
      requestAnimationFrame(() => requestAnimationFrame(() => {
        flyer.style.transition = 'left 0.3s ease-in, width 0.3s ease-in, opacity 0.28s ease-in';
        flyer.style.left       = BOX_X + 'px';
        flyer.style.width      = (BOX_W - 16) + 'px';
        flyer.style.opacity    = '0.22';
      }));

    }, t0);

    // Step B: box glows, flyer vanishes, left card updates
    T(() => {
      flyer.style.transition = 'opacity 0.12s';
      flyer.style.opacity    = '0';

      if (aibox) {
        const glow = pass ? 'rgba(16,185,129,0.6)' : 'rgba(239,68,68,0.5)';
        aibox.style.boxShadow   = `0 0 70px ${glow}, inset 0 0 60px rgba(0,0,0,0.5)`;
        aibox.style.borderColor = pass ? 'rgba(16,185,129,0.7)' : 'rgba(239,68,68,0.6)';
        setTimeout(() => {
          if (aibox) {
            aibox.style.boxShadow   = '0 0 50px rgba(79,142,247,0.06),inset 0 0 60px rgba(0,0,0,0.5)';
            aibox.style.borderColor = 'rgba(79,142,247,0.2)';
          }
        }, 400);
      }
      if (audioInited) pass ? SFX.accept() : SFX.reject();

      const card = document.getElementById('s7-lcard-' + i);
      const lsc  = document.getElementById('s7-lsc-' + i);
      if (card) {
        card.style.background  = pass ? 'rgba(16,185,129,0.06)'  : 'rgba(239,68,68,0.04)';
        card.style.borderColor = pass ? 'rgba(16,185,129,0.18)'  : 'rgba(239,68,68,0.15)';
      }
      if (lsc) { lsc.textContent = r.score + '%'; lsc.style.color = pass ? '#10b981' : '#ef4444'; }
    }, t0 + 330);

    // Step C: score slides in on the right
    T(() => {
      const slot = document.getElementById('s7-rscore-' + i);
      const rnum = document.getElementById('s7-rnum-' + i);
      const rlbl = document.getElementById('s7-rlbl-' + i);
      if (!slot || !rnum || !rlbl) return;
      rnum.textContent      = r.score + '%';
      rnum.style.color      = pass ? '#10b981' : '#ef4444';
      rlbl.textContent      = pass ? 'PASS' : 'FAIL';
      rlbl.style.color      = pass ? '#10b981' : '#ef4444';
      rlbl.style.background = pass ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.1)';
      rlbl.style.border     = `1px solid ${pass ? 'rgba(16,185,129,0.28)' : 'rgba(239,68,68,0.22)'}`;
      slot.style.opacity    = '1';
      slot.style.transform  = 'translateX(0)';
    }, t0 + 500);
  });

  // Done
  const lastT = ALL_APPEARED + (resumes.length - 1) * CYCLE + 500;
  T(() => { if (audioInited) SFX.triumph(); }, lastT + 160);

  return () => timers.forEach(t => { try { clearTimeout(t); } catch(e){} });
}

const setupMap = { 1:setup1, 2:setup2, 3:setup3, 4:setup4, 5:setup5, 6:setup7, 7:setup8, 8:setup9, 9:setup11 };

// ════════════════════════════════════════════════════════════════════
// LIGHT/DARK SCENE BACKGROUNDS
// ════════════════════════════════════════════════════════════════════
const lightScenes = new Set([2, 3, 5, 7]);

function applySceneBg(idx) {
  const stage = document.getElementById('stage');
  const gridBg = document.querySelector('.grid-bg');
  if (lightScenes.has(idx)) {
    stage.style.background = 'transparent';
    if (gridBg) gridBg.style.display = 'none';
  } else {
    stage.style.background = '#07070f';
    if (gridBg) gridBg.style.display = '';
  }
  // Subtitle contrast
  const sub = document.getElementById('subtitle');
  if (lightScenes.has(idx)) {
    sub.style.background = 'rgba(0,0,0,0.65)';
    sub.style.color = 'rgba(255,255,255,0.9)';
  } else {
    sub.style.background = 'rgba(0,0,0,0.75)';
    sub.style.color = 'rgba(255,255,255,0.85)';
  }
}

// ════════════════════════════════════════════════════════════════════
// SCENE ENGINE
// ════════════════════════════════════════════════════════════════════
let cur = 0, playing = true, timerRef = null, rafRef = null, sceneStart = null;
let sceneCleaner = null;

// ── Narration MP3 ────────────────────────────────────────────────
const _narration = new Audio('narration.mp3');
_narration.volume = 1.0;

function startNarration() {
  _narration.currentTime = 0;
  _narration.play().catch(() => {});
}

function _showSubtitle(text) {
  const el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = text || '';
  el.style.opacity = text ? '1' : '0';
}

function speakScene(idx) {
  const vo = SCENES[idx] && SCENES[idx].vo;
  _showSubtitle(vo || '');
}

function speakText(text) {
  _showSubtitle(text);
}

function showScene(idx) {
  if (sceneCleaner) { sceneCleaner(); sceneCleaner = null; }
  document.querySelectorAll('.scene').forEach((el,i) => el.classList.toggle('active', i === idx));
  document.getElementById('subtitle').textContent = SCENES[idx].vo;
  document.getElementById('scene-counter').textContent = `${idx+1} / ${SCENES.length}`;
  applySceneBg(idx);
  if (audioInited) { SFX.playScene(idx); speakScene(idx); }
  const res = setupMap[idx] ? setupMap[idx]() : null;
  if (res) sceneCleaner = res;
}

function getElapsedBefore(idx) {
  return SCENES.slice(0,idx).reduce((s,x) => s + x.dur, 0);
}

function startProgress() {
  cancelAnimationFrame(rafRef);
  const bar = document.getElementById('progress-bar');
  const base = getElapsedBefore(cur);
  sceneStart = performance.now();
  function tick(now) {
    bar.style.width = Math.min((base + (now - sceneStart)) / TOTAL * 100, 100) + '%';
    rafRef = requestAnimationFrame(tick);
  }
  rafRef = requestAnimationFrame(tick);
}

function scheduleNext() {
  clearTimeout(timerRef);
  if (!playing) return;
  timerRef = setTimeout(() => {
    if (cur < SCENES.length - 1) { cur++; showScene(cur); startProgress(); scheduleNext(); }
    else cancelAnimationFrame(rafRef);
  }, SCENES[cur].dur);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? 'Pause' : 'Play';
  if (playing) { sceneStart = performance.now(); startProgress(); scheduleNext(); }
  else { clearTimeout(timerRef); cancelAnimationFrame(rafRef); }
}

function nextScene() {
  if (cur < SCENES.length - 1) { clearTimeout(timerRef); cur++; showScene(cur); startProgress(); scheduleNext(); }
}
function prevScene() {
  if (cur > 0) { clearTimeout(timerRef); cur--; showScene(cur); startProgress(); scheduleNext(); }
}
function restartDemo() {
  clearTimeout(timerRef); cancelAnimationFrame(rafRef);
  cur = 0; playing = true;
  document.getElementById('play-btn').textContent = 'Pause';
  document.getElementById('progress-bar').style.width = '0%';
  showScene(0); startProgress(); scheduleNext();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextScene();
  if (e.key === 'ArrowLeft')  prevScene();
  if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
  if (e.key === 'r' || e.key === 'R') restartDemo();
  if (e.key === 'm' || e.key === 'M') toggleMute();
});

// Start
showScene(0);
startProgress();
scheduleNext();

// ── Fullscreen scale ─────────────────────────────────────────────
function scaleStage() {
  const stage = document.getElementById('stage');
  const scaleX = window.innerWidth  / 1280;
  const scaleY = window.innerHeight / 720;
  const scale  = Math.min(scaleX, scaleY);
  stage.style.transform = `scale(${scale})`;
}
scaleStage();
window.addEventListener('resize', scaleStage);
